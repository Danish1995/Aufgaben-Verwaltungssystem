<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <title>Employee Directory</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .table thead th {
            vertical-align: middle;
            text-align: center;
        }
        .table tbody td {
            vertical-align: middle;
            text-align: center;
        }
        .header-buttons {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .badge-role {
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Employee Directory</h2>
        <div>
            <p class="mb-0">Logged in as: <strong><span sec:authentication="name"></span></strong></p>
        </div>
    </div>

    <div class="header-buttons mb-3">
        <div sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/registerUserForm}" class="btn btn-success btn-sm">
                <i class="bi bi-person-plus"></i>  Add User
            </a>
        </div>
        <div sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/tasks}" class="btn btn-success btn-sm">
                <i class="bi bi-person-plus"></i> See All Tasks
            </a>
        </div>
        <div>
            <a th:href="@{/userProfile}" class="btn btn-primary btn-sm">
                <i class="bi bi-person-circle"></i> My Profile
            </a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button type="submit" class="btn btn-danger btn-sm">
                    <i class="bi bi-box-arrow-right"></i> Logout
                </button>
            </form>
        </div>
    </div>

    <div class="table-responsive shadow-sm rounded bg-white p-3">
        <table class="table table-hover align-middle">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Role</th>
                <th sec:authorize="hasRole('ADMIN')">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="singleUser : ${users}">
                <td th:text="${singleUser.id}">1</td>
                <td th:text="${singleUser.name}">John Doe</td>
                <td th:text="${singleUser.email}">john@example.com</td>
                <td>
                    <span th:text="${singleUser.role}"
                          th:classappend="'badge badge-role bg-' + (${singleUser.role} == 'ADMIN' ? 'danger' : (${singleUser.role} == 'MANAGER' ? 'warning text-dark' : 'secondary'))">
                        ROLE
                    </span>
                </td>
                <td sec:authorize="hasRole('ADMIN')">
                    <a th:href="@{/users/{id}(id=${singleUser.id})}" class="btn btn-sm btn-primary me-1">
                        Update
                    </a>
                    <form th:action="@{/users/delete/{id}(id=${singleUser.id})}" method="post" class="d-inline">
                        <input type="hidden" name="_method" value="delete"/>
                        <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

</div>

<!-- Optional Bootstrap Icons CDN -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

</body>
</html>
