<!DOCTYPE HTML>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Save User</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .user-card {
            max-width: 500px;
            margin: 50px auto;
            padding: 30px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .user-card h3 {
            margin-bottom: 20px;
            text-align: center;
        }
        .btn-submit {
            width: 100%;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 15px;
        }
    </style>
</head>

<body>

<div class="user-card">

    <h3 th:text="${adduser.id != null} ? 'Update User' : 'Add User'">Add User</h3>

    <form th:action="@{/users}" th:object="${adduser}" method="POST">

        <!-- ID (hidden) -->
        <input type="hidden" th:if="*{id != null}" th:field="*{id}">

        <!-- NAME -->
        <div class="mb-3">
            <input type="text" th:field="*{name}" class="form-control"
                   placeholder="Name"
                   th:classappend="${#fields.hasErrors('name')}? 'is-invalid'">
            <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
        </div>

        <!-- ROLE -->
        <div class="mb-3">
            <select th:field="*{role}" class="form-select"
                    th:classappend="${#fields.hasErrors('role')}? 'is-invalid'">
                <option value="">Select Role</option>
                <option value="ADMIN">ADMIN</option>
                <option value="MEMBER">MEMBER</option>
                <option value="MANAGER">MANAGER</option>
            </select>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('role')}" th:errors="*{role}"></div>
        </div>

        <!-- EMAIL -->
        <div class="mb-3">
            <input type="email" th:field="*{email}" class="form-control"
                   placeholder="Email"
                   th:classappend="${#fields.hasErrors('email')}? 'is-invalid'">
            <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
        </div>

        <!-- PASSWORD -->
        <div class="mb-3">
            <input type="password" th:field="*{password}" class="form-control"
                   placeholder="Password"
                   th:classappend="${#fields.hasErrors('password')}? 'is-invalid'">
            <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
        </div>

        <button type="submit" class="btn btn-primary btn-submit"
                th:text="${adduser.id != null} ? 'Update User' : 'Save User'">Save User</button>
    </form>

    <a th:href="@{/users}" class="back-link">Back to User List</a>

</div>

</body>
</html>
