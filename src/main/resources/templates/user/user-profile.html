<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <title>User Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .profile-card {
            max-width: 600px;
            margin: auto;
            margin-top: 50px;
            padding: 30px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .profile-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .profile-header h2 {
            margin-bottom: 5px;
        }
        .badge-role {
            font-size: 0.9rem;
        }
        .profile-info p {
            margin-bottom: 10px;
        }
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="profile-card">

    <div class="profile-header">
        <h2>User Profile</h2>
        <p class="text-muted">Logged in as <strong><span sec:authentication="name"></span></strong></p>
        <p>
            <strong>Roles:</strong>
            <span sec:authentication="principal.authorities" class="badge bg-info text-dark"></span>
        </p>
    </div>

    <hr>

    <div class="profile-info">
        <p><strong>Name:</strong> <span th:text="${user.name}">John Doe</span></p>
        <p><strong>Email:</strong> <span th:text="${user.email}">john@example.com</span></p>
        <p>
            <strong>Role:</strong>
            <span th:text="${user.role}"
                  th:classappend="'badge bg-' + (${user.role} == 'ADMIN' ? 'danger' : (${user.role} == 'MANAGER' ? 'warning text-dark' : 'secondary'))">
                MEMBER
            </span>
        </p>
    </div>

    <div class="btn-group">
        <a th:href="@{/users}" class="btn btn-primary">Back to Users</a>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn btn-danger">Logout</button>
        </form>
    </div>

</div>

</body>
</html>
