<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>All registered users</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
</head>
<body>

<div class="container">

    <h3>Employee Directory</h3>
    <hr>
    <!-- Add a button -->
    <a th:href="@{/registerUserForm}"
       class="btn btn-primary btn-sm mb-3">
        Add User
    </a>

    <table class="table table-bordered table-striped">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>ROLE</th>
            <th>Action</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="singleUser : ${users}">

            <td th:text="${singleUser.id}"/>
            <td th:text="${singleUser.name}"/>
            <td th:text="${singleUser.email}"/>
            <td th:text="${singleUser.role}"/>
            <td>
                <a th:href="@{/users/{id}(id=${singleUser.id})}"
                   class="btn btn-primary btn-sm me-2">
                    Update
                </a>
                <!--  Sends a GET request so we need to use GetMapping to delete id not DeleteMapping-->
                <!--<a th:href="@{/users/delete/{id}(id=${singleUser.id})}" </a> is replace with form so we can use
                     actual delete API in spring-->

                <form th:action="@{/users/delete/{id}(id=${singleUser.id})}" method="post" style="display:inline;" >
                    <input type="hidden" name="_method" value="delete"/>
                    <button type="submit" class="btn btn-danger btn-sm">
                        Delete
                    </button>
                </form>
            </td>


        </tr>
        </tbody>
    </table>

</div>

</body>
</html>
