<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">

<head>
    <meta charset="UTF-8">
    <title>Task Management</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }
        .table thead th,
        .table tbody td {
            text-align: center;
            vertical-align: middle;
        }
        .badge-status, .badge-priority {
            font-size: 0.85rem;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Task Management</h2>
        <p class="mb-0">
            Logged in as:
            <strong><span sec:authentication="name"></span></strong>
        </p>
    </div>

    <!-- Buttons -->
    <div class="d-flex justify-content-between mb-3 flex-wrap">

        <div>
            <a th:href="@{/tasks/add}" class="btn btn-success btn-sm">
                <i class="bi bi-plus-circle"></i> Add Task
            </a>
        </div>

        <div>
            <a th:href="@{/userProfile}" class="btn btn-primary btn-sm">
                My Profile
            </a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button class="btn btn-danger btn-sm">Logout</button>
            </form>
        </div>

    </div>

    <!-- Table -->
    <div class="table-responsive shadow-sm rounded bg-white p-3">

        <table class="table table-hover align-middle">

            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Description</th>
                <th>Status</th>
                <th>Priority</th>
                <th>Due Date</th>
                <th>Assigned User</th>
                <th>Created</th>
                <th>Updated</th>
                <th sec:authorize="hasRole('ADMIN')">Actions</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="task : ${tasks}">

                <td th:text="${task.id}">1</td>

                <td th:text="${task.title}">Task Title</td>

                <td th:text="${task.description}">Description</td>

                <!-- Status -->
                <td>
                    <span th:text="${task.status}"
                          th:classappend="'badge badge-status bg-' +
                          (${task.status} == 'DONE' ? 'success' :
                          (${task.status} == 'IN_PROGRESS' ? 'warning text-dark' : 'secondary'))">
                    </span>
                </td>

                <!-- Priority -->
                <td>
                    <span th:text="${task.priority}"
                          th:classappend="'badge badge-priority bg-' +
                          (${task.priority} == 'HIGH' ? 'danger' :
                          (${task.priority} == 'MEDIUM' ? 'warning text-dark' : 'secondary'))">
                    </span>
                </td>

                <!-- Dates -->
                <td th:text="${#temporals.format(task.dueDate, 'yyyy-MM-dd HH:mm')}"></td>
                <td th:text="${task.assignedUser != null ? task.assignedUser.name : 'Unassigned'}"></td>
                <td th:text="${#temporals.format(task.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                <td th:text="${#temporals.format(task.updatedAt, 'yyyy-MM-dd HH:mm')}"></td>

                <!-- Actions -->
                <td sec:authorize="hasRole('ADMIN')">

                    <a th:href="@{/tasks/edit/{taskID}(taskID=${task.id})}"
                       class="btn btn-sm btn-primary me-1">
                        Edit
                    </a>

                    <form th:action="@{/tasks/delete/{id}(id=${task.id})}"
                          method="post"
                          class="d-inline">
                        <input type="hidden" name="_method" value="delete"/>
                        <button class="btn btn-sm btn-danger">
                            Delete
                        </button>
                    </form>

                </td>

            </tr>
            </tbody>

        </table>
    </div>

</div>

<link rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

</body>
</html>
