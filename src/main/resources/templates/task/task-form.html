<!DOCTYPE HTML>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Add Task</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }
        .task-card {
            max-width: 600px;
            margin: 50px auto;
            padding: 30px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .task-card h3 {
            margin-bottom: 20px;
            text-align: center;
        }
        .btn-submit {
            width: 100%;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 15px;
        }
    </style>
</head>

<body>

<div class="task-card">

    <h3>Add New Task</h3>

    <form th:action="@{/tasks/save}" th:object="${task}" method="post">

        <!-- TITLE -->
        <div class="mb-3">
            <input type="text" th:field="*{title}" class="form-control"
                   placeholder="Task Title"
                   th:classappend="${#fields.hasErrors('title')}? 'is-invalid'">
            <div class="invalid-feedback"
                 th:if="${#fields.hasErrors('title')}"
                 th:errors="*{title}"></div>
        </div>

        <!-- DESCRIPTION -->
        <div class="mb-3">
            <textarea th:field="*{description}" class="form-control"
                      placeholder="Description"
                      th:classappend="${#fields.hasErrors('description')}? 'is-invalid'"></textarea>
            <div class="invalid-feedback"
                 th:if="${#fields.hasErrors('description')}"
                 th:errors="*{description}"></div>
        </div>

        <!-- PRIORITY -->
        <div class="mb-3">
            <select th:field="*{priority}" class="form-select"
                    th:classappend="${#fields.hasErrors('priority')}? 'is-invalid'">
                <option value="">Select Priority</option>
                <option value="LOW">LOW</option>
                <option value="MEDIUM">MEDIUM</option>
                <option value="HIGH">HIGH</option>
            </select>
            <div class="invalid-feedback"
                 th:if="${#fields.hasErrors('priority')}"
                 th:errors="*{priority}"></div>
        </div>

        <!-- STATUS -->
        <div class="mb-3">
            <select th:field="*{status}" class="form-select"
                    th:classappend="${#fields.hasErrors('status')}? 'is-invalid'">
                <option value="">Select Status</option>
                <option value="PENDING">PENDING</option>
                <option value="IN_PROGRESS">IN_PROGRESS</option>
                <option value="COMPLETED">COMPLETED</option>
            </select>
            <div class="invalid-feedback"
                 th:if="${#fields.hasErrors('status')}"
                 th:errors="*{status}"></div>
        </div>

        <!-- DUE DATE -->
        <div class="mb-3">
            <input type="datetime-local" th:field="*{dueDate}" class="form-control"
                   th:classappend="${#fields.hasErrors('dueDate')}? 'is-invalid'">
            <div class="invalid-feedback"
                 th:if="${#fields.hasErrors('dueDate')}"
                 th:errors="*{dueDate}"></div>
        </div>

        <!-- SUBMIT BUTTON -->
        <button type="submit" class="btn btn-primary btn-submit">
            Save Task
        </button>

    </form>

    <a th:href="@{/tasks}" class="back-link">Back to Task List</a>

</div>

</body>
</html>
