<!DOCTYPE HTML>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi" crossorigin="anonymous">

    <title>Save User</title>
</head>

<body>

<div class="container">

    <h3>User Directory</h3>
    <hr>

    <p class="h4 mb-4">Save User</p>

    <form th:action="@{/users}" th:object="${adduser}" method="POST" class="w-50">

        <!-- NAME -->
        <div class="mb-3">
            <input type="text" th:field="*{name}"
                   class="form-control
                      "
                   placeholder="Name"
                   th:classappend="${#fields.hasErrors('name')}? 'is-invalid'">
            <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
        </div>

        <!-- ROLE -->
        <div class="mb-3">
            <select th:field="*{role}"
                    class="form-select"
                    th:classappend="${#fields.hasErrors('role')}? 'is-invalid'">
                <option value="">Select Role</option>
                <option value="ADMIN">ADMIN</option>
                <option value="MEMBER">MEMBER</option>
                <option value="MANAGER">MANAGER</option>
            </select>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('role')}" th:errors="*{role}"></div>
        </div>

        <!-- EMAIL -->
        <div class="mb-3">
            <input type="text" th:field="*{email}"
                   class="form-control"
                   placeholder="Email"
                   th:classappend="${#fields.hasErrors('email')}? 'is-invalid'">
            <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
        </div>

        <button type="submit" class="btn btn-primary">Save</button>
    </form>

    <hr>
    <a th:href="@{/users}">Back to User List</a>

</div>


</body>

</html>
